name: Publish loisa-composio-cli

on:
  pull_request:
    paths:
      - "simpler-composio-cli/**"
      - ".github/workflows/publish-loisa-composio-cli.yml"
  push:
    branches:
      - main
      - master
    tags:
      - "loisa-composio-cli-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simpler-composio-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simpler-composio-cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm and GitHub
    needs: verify
    if: startsWith(github.ref, 'refs/tags/loisa-composio-cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: simpler-composio-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: simpler-composio-cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Published loisa-composio-cli ${GITHUB_REF_NAME#loisa-composio-cli-v} to npm."
        env:
          GH_TOKEN: ${{ github.token }}
